name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          # CI não tem Ollama rodando — qualquer tool que tente
          # chamar localhost:11434 deve falhar de forma controlada
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: fake-model
        run: |
          pytest -v --tb=short

      - name: Lint (best-effort)
        run: |
          python -m py_compile main.py tools.py agent.py routes.py google_services.py news_scraper.py
          echo "✅ py_compile OK"