name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          # CI não tem Ollama rodando — qualquer tool que tente
          # chamar localhost:11434 deve falhar de forma controlada
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: fake-model
        run: |
          pytest -v --tb=short

      - name: Lint (best-effort)
        run: |
          python -m py_compile main.py google_services.py news_scraper.py
          python -m py_compile jarvis/__init__.py jarvis/agent.py jarvis/config.py jarvis/errors.py jarvis/http_client.py
          python -m py_compile jarvis/routes/__init__.py jarvis/routes/chat.py jarvis/routes/dashboard.py jarvis/routes/google_extras.py jarvis/routes/home.py
          python -m py_compile jarvis/tools/__init__.py jarvis/tools/bolsa.py jarvis/tools/clima.py jarvis/tools/email.py jarvis/tools/esportes.py jarvis/tools/google.py jarvis/tools/investimentos.py jarvis/tools/noticias.py jarvis/tools/rotas.py
          echo "✅ py_compile OK"