"""Workflow: deploy da landing page estática pro GitHub Pages.

Como o jarvis é um app Flask (com LangGraph + Ollama local), não dá pra
hospedar o backend no Pages (que só serve estáticos). Esta action só
publica uma landing page com preview do projeto.

Gatilho: push na branch `main` quando há mudança em `docs/`.
"""

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Não pode rodar em paralelo com outros deploys de Pages
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4